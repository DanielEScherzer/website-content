name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  PHP_VERSION: 8.3

jobs:
  lint:
    name: Lint with parallel-lint and PHPCS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer

      - name: Install composer dependencies
        run: composer install

      - name: Run parallel-lint
        run: vendor/bin/parallel-lint . --exclude vendor

      - name: Run phpcs
        run: vendor/bin/phpcs -p -s

  test:
    name: "PHPUnit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer

      - name: Install composer dependencies
        run: composer install

      - name: Install python
        run: sudo apt-get install -y python3
      
      - name: Ensure python versions
        run: sudo apt-get satisfy "python3 (>= 3.11, <= 3.12)"

      - name: Install pip
        run: sudo apt-get install -y python3-pip

      - name: Install pygments
        run: pip install Pygments==2.19.1 --break-system-packages

      - name: Run phpunit
        run: vendor/bin/phpunit

  test-highlight:
    name: "PHPUnit"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.3, 8.4]
        commonmark: ["^2.7"]
        yaml: ["6.4.*", "7.2.*", "7.3.*"]
        python: [">= 3.11, << 3.12", ">= 3.12, << 3.13"]
        pygments: ["2.17.*", "2.18.*", "2.19.*"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Set league/commonmark version
        run: composer require "league/commonmark:${{ matrix.commonmark }}"

      - name: Set symfony/yaml version
        run: composer require "symfony/yaml:${{ matrix.yaml }}"

      - name: Install composer dependencies
        run: composer install

      - name: Install python
        run: sudo apt-get install -y python3

      - name: Ensure python versions
        run: sudo apt-get satisfy "python3 (${{ matrix.python }})"

      - name: Install pip
        run: sudo apt-get install -y python3-pip

      - name: Install pygments
        run: pip install Pygments==${{ matrix.pygments }} --break-system-packages

      - name: Run phpunit
        run: vendor/bin/phpunit tests/Blog/PygmentsHighlightHTMLTest.php
